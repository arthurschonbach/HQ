<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQ — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
    /* ═══════════════════════════════════════════
       RESET & BASE
       ═══════════════════════════════════════════ */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
        --bg-base: #07080D;
        --bg-surface: #0F1117;
        --bg-card: #13151E;
        --bg-card-hover: #1A1D2A;
        --bg-elevated: #1E2233;
        --border-subtle: rgba(255,255,255,0.05);
        --border-default: rgba(255,255,255,0.08);
        --text-primary: #EDEEF2;
        --text-secondary: #9BA1B2;
        --text-muted: #5C6378;
        --accent: #818CF8;
        --accent-dim: rgba(129,140,248,0.12);
        --accent-strong: #6366F1;
        --green: #34D399;
        --green-dim: rgba(52,211,153,0.10);
        --red: #F87171;
        --red-dim: rgba(248,113,113,0.10);
        --yellow: #FBBF24;
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --shadow-card: 0 1px 3px rgba(0,0,0,0.3), 0 4px 14px rgba(0,0,0,0.15);
        --transition-fast: 150ms ease;
        --transition-base: 250ms ease;
    }

    html {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg-base);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
    }

    body { min-height:100vh; padding:28px 32px; max-width:1480px; margin:0 auto; }

    @media (max-width:768px) { body { padding:16px; } }

    /* ═══════════════════════════════════════════
       HEADER
       ═══════════════════════════════════════════ */
    .header {
        display:flex; align-items:center; justify-content:space-between;
        margin-bottom:32px; flex-wrap:wrap; gap:12px;
    }
    .header-left { display:flex; align-items:center; gap:14px; }
    .logo {
        width:38px; height:38px; border-radius:10px;
        background: linear-gradient(135deg, var(--accent-strong), #a78bfa);
        display:grid; place-items:center; font-weight:800; font-size:15px; color:#fff;
        letter-spacing:-0.5px;
    }
    .header h1 {
        font-size:22px; font-weight:700; letter-spacing:-0.5px;
        background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
        -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .header-right { display:flex; align-items:center; gap:16px; }
    .header-date { font-size:13px; color:var(--text-muted); font-weight:500; }
    .live-badge {
        display:flex; align-items:center; gap:6px;
        font-size:11px; font-weight:600; text-transform:uppercase;
        letter-spacing:0.6px; color:var(--green); padding:5px 12px;
        background:var(--green-dim); border-radius:20px;
    }
    .live-dot {
        width:7px; height:7px; border-radius:50%; background:var(--green);
        animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
        0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(52,211,153,0.4); }
        50% { opacity:.7; box-shadow:0 0 0 6px rgba(52,211,153,0); }
    }
    .live-badge.closed {
        color:var(--text-muted); background:var(--bg-elevated);
    }
    .closed-icon { font-size:9px; opacity:0.5; line-height:1; }

    /* ═══════════════════════════════════════════
       SECTION TITLES
       ═══════════════════════════════════════════ */
    .section-label {
        font-size:11px; font-weight:600; text-transform:uppercase;
        letter-spacing:1.2px; color:var(--text-muted); margin-bottom:14px;
        display:flex; align-items:center; gap:8px;
    }
    .section-label::after {
        content:''; flex:1; height:1px; background:var(--border-subtle);
    }

    /* ═══════════════════════════════════════════
       ETF CARDS
       ═══════════════════════════════════════════ */
    .etf-grid {
        display:grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap:16px; margin-bottom:40px;
    }
    .etf-card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 20px 22px 14px;
        transition: border-color var(--transition-base), box-shadow var(--transition-base), transform var(--transition-fast);
        position: relative;
        overflow: hidden;
        cursor: default;
    }
    .etf-card:hover {
        border-color: var(--border-default);
        box-shadow: var(--shadow-card);
        transform: translateY(-2px);
    }
    .etf-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
    .etf-name { font-size:15px; font-weight:600; color:var(--text-primary); line-height:1.2; }
    .etf-ticker {
        font-size:11px; font-weight:600; color:var(--text-muted);
        background:var(--bg-elevated); padding:3px 8px; border-radius:6px;
        letter-spacing:0.4px;
    }
    .etf-price { font-size:28px; font-weight:700; letter-spacing:-1px; margin-bottom:2px; }
    .etf-change {
        font-size:13px; font-weight:600; display:inline-flex;
        align-items:center; gap:4px; padding:3px 10px;
        border-radius:8px; margin-bottom:12px;
    }
    .etf-change.up { color:var(--green); background:var(--green-dim); }
    .etf-change.down { color:var(--red); background:var(--red-dim); }
    .etf-change svg { width:14px; height:14px; }
    .etf-meta {
        display:flex; gap:16px; font-size:11px; color:var(--text-muted);
        margin-top:8px; padding-top:10px; border-top:1px solid var(--border-subtle);
    }
    .etf-meta span b { color:var(--text-secondary); font-weight:600; }
    .etf-day-label {
        font-size:10px; font-weight:500; opacity:0.6;
        margin-left:2px; letter-spacing:0.3px;
    }
    .etf-range {
        display:flex; align-items:center; gap:8px;
        font-size:10px; color:var(--text-muted);
        margin-top:6px;
    }
    .etf-range .range-label b { color:var(--text-secondary); font-weight:600; }
    .etf-range .range-track {
        flex:1; height:4px; background:var(--bg-elevated);
        border-radius:4px; position:relative;
    }
    .etf-range .range-dot {
        position:absolute; top:50%; width:8px; height:8px;
        background:var(--text-secondary); border-radius:50%;
        transform:translate(-50%,-50%);
        box-shadow:0 0 0 2px var(--bg-card);
    }
    .sparkline-wrap { width:100%; height:52px; margin-top:4px; }
    .sparkline-wrap canvas { width:100%; height:100%; display:block; }

    /* ═══════════════════════════════════════════
       INFO TOOLTIPS
       ═══════════════════════════════════════════ */
    .info-tip {
        display:inline-flex; align-items:center;
        justify-content:center; cursor:help; flex-shrink:0;
    }
    .info-dot {
        width:15px; height:15px; border-radius:50%;
        background:var(--bg-elevated); border:1px solid var(--border-default);
        display:grid; place-items:center;
        font-size:9px; font-weight:700; color:var(--text-muted);
        line-height:1; transition: all var(--transition-fast);
        user-select:none;
    }
    .info-tip:hover .info-dot, .info-tip.active .info-dot {
        background:var(--accent-dim); border-color:var(--accent);
        color:var(--accent);
    }
    /* Global floating tooltip */
    #globalTooltip {
        position:fixed; z-index:9999;
        background:#1E2233; border:1px solid rgba(255,255,255,0.1);
        border-radius:10px; padding:10px 14px;
        font-size:12px; font-weight:400; line-height:1.55;
        color:#9BA1B2; max-width:260px; width:max-content;
        box-shadow: 0 12px 32px rgba(0,0,0,0.5);
        pointer-events:none; opacity:0;
        transition: opacity 150ms ease;
    }
    #globalTooltip.visible { opacity:1; }

    /* Inline info in section labels */
    .section-info {
        display:inline-flex; margin-left:2px; vertical-align:middle;
    }

    /* ═══════════════════════════════════════════
       THEME TABS
       ═══════════════════════════════════════════ */
    .themes-section { margin-bottom:40px; }
    .theme-tabs {
        display:flex; gap:8px; margin-bottom:20px;
        overflow-x:auto; padding-bottom:4px;
        scrollbar-width:none;
    }
    .theme-tabs::-webkit-scrollbar { display:none; }
    .theme-tab {
        flex-shrink:0; padding:9px 18px; border-radius:10px;
        font-size:13px; font-weight:500; cursor:pointer;
        border:1px solid var(--border-subtle);
        background:var(--bg-surface); color:var(--text-secondary);
        transition: all var(--transition-base);
        display:flex; align-items:center; gap:7px;
        user-select:none; white-space:nowrap;
    }
    .theme-tab:hover {
        border-color:var(--border-default);
        color:var(--text-primary);
        background:var(--bg-card);
    }
    .theme-tab.active {
        background: var(--accent-dim);
        border-color: var(--accent);
        color: var(--accent);
        font-weight:600;
    }
    .theme-tab .tab-icon { font-size:15px; }

    /* ═══════════════════════════════════════════
       PREDICTION MARKET CARDS
       ═══════════════════════════════════════════ */
    .predictions-grid {
        display:grid;
        grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
        gap:14px;
    }
    .pred-card {
        background: var(--bg-card);
        border:1px solid var(--border-subtle);
        border-radius:var(--radius-md);
        padding:18px 20px;
        transition: all var(--transition-base);
        display:flex; flex-direction:column; gap:14px;
        animation: fadeSlideIn 0.35s ease both;
    }
    .pred-card:hover {
        border-color:var(--border-default);
        box-shadow: var(--shadow-card);
        transform: translateY(-1px);
    }
    @keyframes fadeSlideIn {
        from { opacity:0; transform:translateY(10px); }
        to { opacity:1; transform:translateY(0); }
    }
    .pred-card:nth-child(1) { animation-delay: 0.00s; }
    .pred-card:nth-child(2) { animation-delay: 0.05s; }
    .pred-card:nth-child(3) { animation-delay: 0.10s; }
    .pred-card:nth-child(4) { animation-delay: 0.15s; }
    .pred-card:nth-child(5) { animation-delay: 0.20s; }
    .pred-card:nth-child(6) { animation-delay: 0.25s; }

    .pred-question {
        font-size:14px; font-weight:500; line-height:1.45;
        color:var(--text-primary);
        display:-webkit-box; -webkit-line-clamp:2;
        -webkit-box-orient:vertical; overflow:hidden;
    }
    .pred-bar-section { display:flex; flex-direction:column; gap:8px; }
    .pred-probabilities {
        display:flex; justify-content:space-between; align-items:center;
    }
    .pred-yes {
        font-size:24px; font-weight:700; letter-spacing:-0.5px;
    }
    .pred-no {
        font-size:13px; font-weight:500; color:var(--text-muted);
    }
    .pred-bar-track {
        width:100%; height:8px; background:var(--bg-elevated);
        border-radius:8px; overflow:hidden; position:relative;
    }
    .pred-bar-fill {
        height:100%; border-radius:8px;
        transition: width 0.8s cubic-bezier(.4,0,.2,1);
        position:relative;
    }
    .pred-bar-fill::after {
        content:''; position:absolute; inset:0;
        background: linear-gradient(90deg, transparent 60%, rgba(255,255,255,0.15));
        border-radius:inherit;
    }
    .pred-meta {
        display:flex; align-items:center; justify-content:space-between;
        font-size:11px; color:var(--text-muted);
    }
    .pred-volume {
        display:flex; align-items:center; gap:4px;
        font-weight:500;
    }
    .pred-volume svg { width:13px; height:13px; opacity:0.6; }
    .pred-end { font-weight:500; }
    .pred-source {
        font-size:10px; font-weight:600; text-transform:uppercase;
        letter-spacing:0.5px; padding:2px 7px; border-radius:4px;
        background:var(--bg-elevated); color:var(--text-muted);
    }

    /* 7d delta badge */
    .pred-delta {
        display:inline-flex; align-items:center; gap:2px;
        font-size:11px; font-weight:600; padding:2px 7px;
        border-radius:6px; margin-left:6px; vertical-align:middle;
        letter-spacing:-0.2px;
    }
    .pred-delta.up   { color:var(--green); background:var(--green-dim); }
    .pred-delta.down { color:var(--red);   background:var(--red-dim); }
    .pred-delta.flat { color:var(--text-muted); background:var(--bg-elevated); }
    .pred-delta svg  { width:11px; height:11px; }

    /* probability color helpers */
    .prob-high { color:#34D399; }
    .prob-mid  { color:#FBBF24; }
    .prob-low  { color:#F87171; }
    .bar-high  { background: linear-gradient(90deg, #059669, #34D399); }
    .bar-mid   { background: linear-gradient(90deg, #D97706, #FBBF24); }
    .bar-low   { background: linear-gradient(90deg, #DC2626, #F87171); }

    /* ═══════════════════════════════════════════
       FOOTER
       ═══════════════════════════════════════════ */
    .footer {
        margin-top:48px; padding-top:20px;
        border-top:1px solid var(--border-subtle);
        display:flex; justify-content:space-between; align-items:center;
        flex-wrap:wrap; gap:8px;
        font-size:11px; color:var(--text-muted);
    }
    .footer a {
        color:var(--accent); text-decoration:none; font-weight:500;
    }
    .footer a:hover { text-decoration:underline; }

    /* ═══════════════════════════════════════════
       LOADING SKELETON
       ═══════════════════════════════════════════ */
    .skeleton {
        background: linear-gradient(90deg,
            var(--bg-elevated) 25%, rgba(255,255,255,0.04) 50%, var(--bg-elevated) 75%);
        background-size:200% 100%;
        animation: shimmer 1.5s infinite;
        border-radius:6px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ═══════════════════════════════════════════
       RESPONSIVE
       ═══════════════════════════════════════════ */
    @media (max-width:640px) {
        .etf-grid { grid-template-columns:1fr 1fr; gap:10px; }
        .predictions-grid { grid-template-columns:1fr; }
        .etf-price { font-size:22px; }
        .etf-card { padding:14px 16px 10px; }
        body { padding:14px; }
        .header h1 { font-size:18px; }
    }
    @media (max-width:400px) {
        .etf-grid { grid-template-columns:1fr; }
    }
    </style>
</head>

<!-- ═══ HEADER ═══ -->
<header class="header">
    <div class="header-left">
        <div class="logo">HQ</div>
        <h1>Dashboard</h1>
    </div>
    <div class="header-right">
        <span class="header-date" id="headerDate"></span>
        <div class="live-badge" id="marketBadge"><span class="live-dot"></span> Live</div>
    </div>
</header>

<!-- ═══ ETF SECTION ═══ -->
<div class="section-label">Market ETFs <span class="info-tip section-info" data-tip="EUR ETFs tracking major indices. Day % = change vs yesterday's close. L/H = today's low–high range with price position. Open/Prev = today's open & yesterday's close. YTD = since Jan 1. Chart = 1-month."><span class="info-dot">?</span></span></div>
<div class="etf-grid" id="etfGrid"></div>

<!-- ═══ PREDICTION MARKETS ═══ -->
<div class="themes-section">
    <div class="section-label">Prediction Markets <span class="info-tip section-info" data-tip="Real-money markets sorted by biggest 7d movers. Yes % = probability. 7d = weekly change in pts. Vol = money wagered. Use ← → keys to switch themes."><span class="info-dot">?</span></span></div>
    <div class="theme-tabs" id="themeTabs"></div>
    <div class="predictions-grid" id="predictionsGrid"></div>
</div>

<!-- ═══ FOOTER ═══ -->
<footer class="footer">
    <span>Data sources: Yahoo Finance, <a href="https://polymarket.com" target="_blank">Polymarket</a>, <a href="https://kalshi.com" target="_blank">Kalshi</a></span>
    <span id="lastUpdated">Updating…</span>
</footer>

<script>
/* ═══════════════════════════════════════════════════════════
   CONFIGURATION
   ═══════════════════════════════════════════════════════════ */
const CORS_PROXY = 'https://corsproxy.io/?url=';
const REFRESH_INTERVAL = 5 * 60 * 1000; // 5 min

/* ═══════════════════════════════════════════════════════════
   ETF DATA
   ═══════════════════════════════════════════════════════════ */
const ETF_CONFIG = [
    { name:'MSCI World',        ticker:'IWDA.AS',  currency:'€', color:'#818CF8' },
    { name:'Nasdaq 100',        ticker:'CNDX.AS',  currency:'€', color:'#38BDF8' },
    { name:'Stoxx 600',         ticker:'EXSA.DE',  currency:'€', color:'#FB923C' },
    { name:'Emerging Markets',  ticker:'EMIM.AS',  currency:'€', color:'#C084FC' },
];

/* Generate realistic mock sparkline data */
function generateSparkline(basePrice, changePct, points = 30) {
    const data = [];
    const endPrice = basePrice;
    const startPrice = basePrice / (1 + changePct * 3 / 100);
    const drift = (endPrice - startPrice) / points;
    let price = startPrice;
    for (let i = 0; i < points; i++) {
        price += drift + (Math.random() - 0.48) * basePrice * 0.008;
        price = Math.max(price * 0.95, price);
        data.push(price);
    }
    data[data.length - 1] = endPrice;
    return data;
}

/* Fallback ETF data (realistic as of March 2026 estimates) */
function getMockETFData() {
    return [
        { price:89.54,  change:0.38,  changePct:0.43, open:89.16, prevClose:89.16, dayHigh:89.92, dayLow:88.80, ytdPct:5.8 },
        { price:42.18,  change:0.34,  changePct:0.81, open:41.90, prevClose:41.84, dayHigh:42.30, dayLow:41.72, ytdPct:9.2 },
        { price:27.14,  change:-0.05, changePct:-0.18, open:27.22, prevClose:27.19, dayHigh:27.35, dayLow:27.01, ytdPct:3.1 },
        { price:33.61,  change:0.11,  changePct:0.33, open:33.48, prevClose:33.50, dayHigh:33.78, dayLow:33.30, ytdPct:2.4 },
    ];
}

/* Try fetching real ETF data from Yahoo Finance */
async function fetchETFData() {
    try {
        const promises = ETF_CONFIG.map(async (etf, i) => {
            // Fetch 1-month chart data AND YTD data in parallel
            const chartUrl = `${CORS_PROXY}${encodeURIComponent(
                `https://query1.finance.yahoo.com/v8/finance/chart/${etf.ticker}?range=1mo&interval=1d&includePrePost=false`
            )}`;
            const ytdUrl = `${CORS_PROXY}${encodeURIComponent(
                `https://query1.finance.yahoo.com/v8/finance/chart/${etf.ticker}?range=ytd&interval=1mo&includePrePost=false`
            )}`;
            const [chartRes, ytdRes] = await Promise.all([
                fetch(chartUrl, { signal: AbortSignal.timeout(6000) }),
                fetch(ytdUrl,   { signal: AbortSignal.timeout(6000) }).catch(() => null),
            ]);
            if (!chartRes.ok) throw new Error(chartRes.status);
            const json = await chartRes.json();
            const meta = json.chart.result[0].meta;
            const quotes = json.chart.result[0].indicators.quote[0];
            const closes = quotes.close.filter(c => c !== null);
            const price = meta.regularMarketPrice;
            const prevClose = meta.chartPreviousClose || meta.previousClose;
            const change = price - prevClose;
            const changePct = (change / prevClose) * 100;

            // Calculate YTD from the YTD range query
            let ytdPct = null;
            try {
                if (ytdRes && ytdRes.ok) {
                    const ytdJson = await ytdRes.json();
                    const ytdStart = ytdJson.chart.result[0].meta.chartPreviousClose;
                    if (ytdStart) ytdPct = ((price - ytdStart) / ytdStart) * 100;
                }
            } catch(e) { /* YTD calc failed, leave null */ }

            return {
                price, change, changePct,
                prevClose, open: quotes.open?.find(o => o) || price,
                dayHigh: meta.regularMarketDayHigh || price,
                dayLow: meta.regularMarketDayLow || price,
                sparkline: closes,
                ytdPct,
                live: true,
            };
        });
        return await Promise.all(promises);
    } catch (e) {
        console.warn('Yahoo Finance fetch failed, using mock data:', e.message);
        return null;
    }
}

/* ═══════════════════════════════════════════════════════════
   PREDICTION MARKET DATA (organised by theme)
   ═══════════════════════════════════════════════════════════ */
const THEMES = [
    { id:'politics',    label:'Politics',         icon:'🏛️' },
    { id:'ai-tech',     label:'AI & Tech',        icon:'🤖' },
    { id:'economy',     label:'Economy',          icon:'💰' },
    { id:'geopolitics', label:'Geopolitics',      icon:'🌍' },
    { id:'climate',     label:'Climate & Energy', icon:'⚡' },
    { id:'science',     label:'Science & Health', icon:'🧬' },
];

const PREDICTIONS = {
    'politics': [
        { q:'Republicans win 2026 US Senate majority?',        yes:62, d7:+3, vol:'$4.2M', end:'Nov 2026', src:'Polymarket' },
        { q:'US federal AI regulation signed into law by 2026?',yes:38, d7:-2, vol:'$1.8M', end:'Dec 2026', src:'Kalshi' },
        { q:'French snap election held in 2026?',              yes:21, d7:+5, vol:'$620K',  end:'Dec 2026', src:'Polymarket' },
        { q:'Trump approval above 45% in March 2026?',         yes:44, d7:-1, vol:'$2.1M', end:'Mar 2026', src:'Kalshi' },
        { q:'US government shutdown before July 2026?',         yes:33, d7:0,  vol:'$1.4M', end:'Jul 2026', src:'Polymarket' },
        { q:'EU Digital Services Act major enforcement action?', yes:56, d7:+4, vol:'$480K',  end:'Dec 2026', src:'Kalshi' },
    ],

/* Try fetching real prediction market data from Polymarket */
async function fetchPolymarketData(tag) {
    try {
        const tagMap = {
            'politics':'politics', 'ai-tech':'ai', 'economy':'economics',
            'geopolitics':'geopolitics', 'climate':'climate', 'science':'science',
        };
        const pTag = tagMap[tag] || tag;
        const url = `https://gamma-api.polymarket.com/markets?closed=false&limit=6&order=volume&ascending=false&tag=${pTag}`;
        const res = await fetch(url, { signal: AbortSignal.timeout(5000) });
        if (!res.ok) throw new Error(res.status);
        const markets = await res.json();
        if (!markets.length) throw new Error('empty');
        // Fetch 7d history for each market in parallel
        const results = await Promise.all(markets.map(async m => {
            const prices = JSON.parse(m.outcomePrices || '["0.5","0.5"]');
            const yes = Math.round(parseFloat(prices[0]) * 100);
            const vol = m.volume ? formatVolume(m.volume) : '—';
            const end = m.endDate ? new Date(m.endDate).toLocaleDateString('en',{month:'short',year:'numeric'}) : '—';
            let d7 = null;
            try {
                const clobId = m.clobTokenIds ? JSON.parse(m.clobTokenIds)[0] : null;
                if (clobId) {
                    const hUrl = `https://clob.polymarket.com/prices-history?market=${clobId}&interval=1w&fidelity=1440`;
                    const hRes = await fetch(hUrl, { signal: AbortSignal.timeout(4000) });
                    if (hRes.ok) {
                        const hist = await hRes.json();
                        if (hist.history && hist.history.length >= 2) {
                            const oldest = parseFloat(hist.history[0].p);
                            const newest = parseFloat(hist.history[hist.history.length - 1].p);
                            d7 = Math.round((newest - oldest) * 100);
                        }
                    }
                }
            } catch(e) { /* history fetch failed, d7 stays null */ }
            return { q: m.question, yes, d7, vol, end, src:'Polymarket', live:true, url:`https://polymarket.com/event/${m.slug}` };
        }));
        return results;
    } catch(e) {
        console.warn(`Polymarket fetch failed for "${tag}":`, e.message);
        return null;
    }
}

function formatVolume(v) {
    if (v >= 1e6) return '$' + (v/1e6).toFixed(1) + 'M';
    if (v >= 1e3) return '$' + (v/1e3).toFixed(0) + 'K';
    return '$' + v;
}

/* ═══════════════════════════════════════════════════════════
   SPARKLINE DRAWING
   ═══════════════════════════════════════════════════════════ */
function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `${r},${g},${b}`;
}

function drawSparkline(canvasId, data, color, isUp) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    const w = rect.width, h = rect.height;
    const pad = 2;
    const min = Math.min(...data);
    const max = Math.max(...data);
    const range = max - min || 1;

    const points = data.map((v, i) => ({
        x: pad + (i / (data.length - 1)) * (w - pad * 2),
        y: pad + (1 - (v - min) / range) * (h - pad * 2),
    }));

    // Gradient fill
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    const c = hexToRgb(color);
    grad.addColorStop(0, `rgba(${c},0.18)`);
    grad.addColorStop(1, `rgba(${c},0.0)`);

    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) {
        const cpx = (points[i-1].x + points[i].x) / 2;
        ctx.quadraticCurveTo(points[i-1].x, points[i-1].y, cpx, (points[i-1].y + points[i].y) / 2);
    }
    ctx.quadraticCurveTo(
        points[points.length-2].x, points[points.length-2].y,
        points[points.length-1].x, points[points.length-1].y
    );

    // Fill
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // Stroke
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) {
        const cpx = (points[i-1].x + points[i].x) / 2;
        ctx.quadraticCurveTo(points[i-1].x, points[i-1].y, cpx, (points[i-1].y + points[i].y) / 2);
    }
    ctx.quadraticCurveTo(
        points[points.length-2].x, points[points.length-2].y,
        points[points.length-1].x, points[points.length-1].y
    );
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.stroke();

    // End dot
    const last = points[points.length - 1];
    ctx.beginPath();
    ctx.arc(last.x, last.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
}

   RENDERING — PREDICTION CARDS
   ═══════════════════════════════════════════════════════════ */
function renderPredictions(items) {
    const grid = document.getElementById('predictionsGrid');
    grid.innerHTML = '';
    const sorted = [...items].sort((a, b) => Math.abs(b.d7 || 0) - Math.abs(a.d7 || 0));
    sorted.forEach((item, i) => {
        const probClass = item.yes >= 60 ? 'prob-high' : item.yes >= 35 ? 'prob-mid' : 'prob-low';
        const barClass = item.yes >= 60 ? 'bar-high' : item.yes >= 35 ? 'bar-mid' : 'bar-low';

        const card = document.createElement('div');
        card.className = 'pred-card';
        card.style.animationDelay = `${i * 0.05}s`;
        if (item.url) card.style.cursor = 'pointer';
        if (item.url) card.onclick = () => window.open(item.url, '_blank');

        card.innerHTML = `
            <div class="pred-question">${item.q}</div>
            <div class="pred-bar-section">
                <div class="pred-probabilities">
                    <span class="pred-yes ${probClass}">${item.yes}% <span style="font-size:11px;font-weight:500;color:var(--text-muted)">Yes</span>
                        ${item.d7 !== null && item.d7 !== undefined ? `<span class="pred-delta ${item.d7 > 0 ? 'up' : item.d7 < 0 ? 'down' : 'flat'}">${item.d7 > 0 ? '<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 10V2M6 2L2 6M6 2L10 6"/></svg>+' + item.d7 : item.d7 < 0 ? '<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2V10M6 10L2 6M6 10L10 6"/></svg>' + item.d7 : '—'}pt</span>` : ''}
                    </span>
                    <span class="pred-no">${100 - item.yes}% No</span>
                </div>
                <div class="pred-bar-track">
                    <div class="pred-bar-fill ${barClass}" style="width:0%"></div>
                </div>
            </div>
            <div class="pred-meta">
                <span class="pred-volume">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
                    ${item.vol}
                </span>
                <span class="pred-end">Ends ${item.end}</span>
                <span class="pred-source">${item.src}</span>
            </div>
        `;
        grid.appendChild(card);

        // Animate bar fill
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                card.querySelector('.pred-bar-fill').style.width = item.yes + '%';
            });
        });
    });
}

   ═══════════════════════════════════════════════════════════ */
document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
        const idx = THEMES.findIndex(t => t.id === activeTheme);
        const next = e.key === 'ArrowRight'
            ? (idx + 1) % THEMES.length
            : (idx - 1 + THEMES.length) % THEMES.length;
        activeTheme = THEMES[next].id;
        renderThemeTabs();
        loadPredictions(activeTheme);
    }
});

/* ═══════════════════════════════════════════════════════════
   MARKET STATUS — reflects actual EU market hours (CET)
   ═══════════════════════════════════════════════════════════ */
function updateMarketStatus() {
    const badge = document.getElementById('marketBadge');
    if (!badge) return;
    const now = new Date();
    const cet = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Paris' }));
    const day = cet.getDay();
    const mins = cet.getHours() * 60 + cet.getMinutes();
    let open = false, label = 'Closed';
    if (day >= 1 && day <= 5) {
        if (mins >= 540 && mins < 1050) { open = true; label = 'Market Open'; }
        else if (mins >= 480 && mins < 540) { label = 'Pre-market'; }
    }
    badge.className = 'live-badge' + (open ? '' : ' closed');
    badge.innerHTML = open
        ? '<span class="live-dot"></span> ' + label
        : '<span class="closed-icon">◦</span> ' + label;
}
updateMarketStatus();
setInterval(updateMarketStatus, 60000);

/* ═══════════════════════════════════════════════════════════
   GLOBAL TOOLTIP — smart viewport-aware positioning
   ═══════════════════════════════════════════════════════════ */
(function() {
    const tip = document.createElement('div');
    tip.id = 'globalTooltip';
    document.body.appendChild(tip);

    let hideTimer = null;

    function show(e) {
        const trigger = e.target.closest('.info-tip');
        if (!trigger) return;
        const text = trigger.getAttribute('data-tip');
        if (!text) return;

        clearTimeout(hideTimer);
        tip.textContent = text;
        tip.classList.add('visible');

        // Measure
        const rect = trigger.getBoundingClientRect();
        const tw = tip.offsetWidth;
        const th = tip.offsetHeight;
        const gap = 8;
        const pad = 12; // min distance from viewport edge

        // Prefer above; fall back to below
        let top, left;
        if (rect.top - th - gap >= pad) {
            top = rect.top - th - gap;
        } else {
            top = rect.bottom + gap;
        }

        // Center horizontally on trigger, clamp to viewport
        left = rect.left + rect.width / 2 - tw / 2;
        left = Math.max(pad, Math.min(left, window.innerWidth - tw - pad));

        tip.style.top = top + 'px';
        tip.style.left = left + 'px';
    }

    function hide() {
        hideTimer = setTimeout(() => tip.classList.remove('visible'), 80);
    }

    document.addEventListener('pointerenter', show, true);
    document.addEventListener('pointerleave', function(e) {
        if (e.target.closest('.info-tip')) hide();
    }, true);

    // Also hide on scroll/resize to avoid stale position
    window.addEventListener('scroll', () => tip.classList.remove('visible'), true);
    window.addEventListener('resize', () => tip.classList.remove('visible'));
})();
</script>
