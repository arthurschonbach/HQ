<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQ — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
    /* ═══════════════════════════════════════════
       RESET & BASE
       ═══════════════════════════════════════════ */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
        --bg-base: #07080D;
        --bg-surface: #0F1117;
        --bg-card: #13151E;
        --bg-card-hover: #1A1D2A;
        --bg-elevated: #1E2233;
        --border-subtle: rgba(255,255,255,0.05);
        --border-default: rgba(255,255,255,0.08);
        --text-primary: #EDEEF2;
        --text-secondary: #9BA1B2;
        --text-muted: #5C6378;
        --accent: #818CF8;
        --accent-dim: rgba(129,140,248,0.12);
        --accent-strong: #6366F1;
        --green: #34D399;
        --green-dim: rgba(52,211,153,0.10);
        --red: #F87171;
        --red-dim: rgba(248,113,113,0.10);
        --yellow: #FBBF24;
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --shadow-card: 0 1px 3px rgba(0,0,0,0.3), 0 4px 14px rgba(0,0,0,0.15);
        --transition-fast: 150ms ease;
        --transition-base: 250ms ease;
    }

    html {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg-base);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
    }

    body { min-height:100vh; padding:28px 32px; max-width:1480px; margin:0 auto; }

    @media (max-width:768px) { body { padding:16px; } }

    /* ═══════════════════════════════════════════
       HEADER
       ═══════════════════════════════════════════ */
    .header {
        display:flex; align-items:center; justify-content:space-between;
        margin-bottom:32px; flex-wrap:wrap; gap:12px;
    }
    .header-left { display:flex; align-items:center; gap:14px; }
    .logo {
        width:38px; height:38px; border-radius:10px;
        background: linear-gradient(135deg, var(--accent-strong), #a78bfa);
        display:grid; place-items:center; font-weight:800; font-size:15px; color:#fff;
        letter-spacing:-0.5px;
    }
    .header h1 {
        font-size:22px; font-weight:700; letter-spacing:-0.5px;
        background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
        -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .header-right { display:flex; align-items:center; gap:16px; }
    .header-date { font-size:13px; color:var(--text-muted); font-weight:500; }
    .live-badge {
        display:flex; align-items:center; gap:6px;
        font-size:11px; font-weight:600; text-transform:uppercase;
        letter-spacing:0.6px; color:var(--green); padding:5px 12px;
        background:var(--green-dim); border-radius:20px;
    }
    .live-dot {
        width:7px; height:7px; border-radius:50%; background:var(--green);
        animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
        0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(52,211,153,0.4); }
        50% { opacity:.7; box-shadow:0 0 0 6px rgba(52,211,153,0); }
    }
    .live-badge.closed {
        color:var(--text-muted); background:var(--bg-elevated);
    }
    .closed-icon { font-size:9px; opacity:0.5; line-height:1; }

    /* ═══════════════════════════════════════════
       SECTION TITLES
       ═══════════════════════════════════════════ */
    .section-label {
        font-size:11px; font-weight:600; text-transform:uppercase;
        letter-spacing:1.2px; color:var(--text-muted); margin-bottom:14px;
        display:flex; align-items:center; gap:8px;
    }
    .section-label::after {
        content:''; flex:1; height:1px; background:var(--border-subtle);
    }

    /* ═══════════════════════════════════════════
       ETF CARDS
       ═══════════════════════════════════════════ */
    .etf-grid {
        display:grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap:16px; margin-bottom:40px;
    }
    .etf-card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 20px 22px 14px;
        transition: border-color var(--transition-base), box-shadow var(--transition-base), transform var(--transition-fast);
        position: relative;
        overflow: hidden;
        cursor: default;
    }
    .etf-card:hover {
        border-color: var(--border-default);
        box-shadow: var(--shadow-card);
        transform: translateY(-2px);
    }
    .etf-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
    .etf-name { font-size:15px; font-weight:600; color:var(--text-primary); line-height:1.2; }
    .etf-ticker {
        font-size:11px; font-weight:600; color:var(--text-muted);
        background:var(--bg-elevated); padding:3px 8px; border-radius:6px;
        letter-spacing:0.4px;
    }
    .etf-price { font-size:28px; font-weight:700; letter-spacing:-1px; margin-bottom:2px; }
    .etf-change {
        font-size:13px; font-weight:600; display:inline-flex;
        align-items:center; gap:4px; padding:3px 10px;
        border-radius:8px; margin-bottom:12px;
    }
    .etf-change.up { color:var(--green); background:var(--green-dim); }
    .etf-change.down { color:var(--red); background:var(--red-dim); }
    .etf-change svg { width:14px; height:14px; }
    .etf-meta {
        display:flex; gap:16px; font-size:11px; color:var(--text-muted);
        margin-top:8px; padding-top:10px; border-top:1px solid var(--border-subtle);
    }
    .etf-meta span b { color:var(--text-secondary); font-weight:600; }
    .etf-day-label {
        font-size:10px; font-weight:500; opacity:0.6;
        margin-left:2px; letter-spacing:0.3px;
    }
    .etf-range {
        display:flex; align-items:center; gap:8px;
        font-size:10px; color:var(--text-muted);
        margin-top:6px;
    }
    .etf-range .range-label b { color:var(--text-secondary); font-weight:600; }
    .etf-range .range-track {
        flex:1; height:4px; background:var(--bg-elevated);
        border-radius:4px; position:relative;
    }
    .etf-range .range-dot {
        position:absolute; top:50%; width:8px; height:8px;
        background:var(--text-secondary); border-radius:50%;
        transform:translate(-50%,-50%);
        box-shadow:0 0 0 2px var(--bg-card);
    }
    .sparkline-wrap { width:100%; height:52px; margin-top:4px; }
    .sparkline-wrap canvas { width:100%; height:100%; display:block; }

    /* ═══════════════════════════════════════════
       INFO TOOLTIPS
       ═══════════════════════════════════════════ */
    .info-tip {
        display:inline-flex; align-items:center;
        justify-content:center; cursor:help; flex-shrink:0;
    }
    .info-dot {
        width:15px; height:15px; border-radius:50%;
        background:var(--bg-elevated); border:1px solid var(--border-default);
        display:grid; place-items:center;
        font-size:9px; font-weight:700; color:var(--text-muted);
        line-height:1; transition: all var(--transition-fast);
        user-select:none;
    }
    .info-tip:hover .info-dot, .info-tip.active .info-dot {
        background:var(--accent-dim); border-color:var(--accent);
        color:var(--accent);
    }
    /* Global floating tooltip */
    #globalTooltip {
        position:fixed; z-index:9999;
        background:#1E2233; border:1px solid rgba(255,255,255,0.1);
        border-radius:10px; padding:10px 14px;
        font-size:12px; font-weight:400; line-height:1.55;
        color:#9BA1B2; max-width:260px; width:max-content;
        box-shadow: 0 12px 32px rgba(0,0,0,0.5);
        pointer-events:none; opacity:0;
        transition: opacity 150ms ease;
    }
    #globalTooltip.visible { opacity:1; }

    /* Inline info in section labels */
    .section-info {
        display:inline-flex; margin-left:2px; vertical-align:middle;
    }

    /* ═══════════════════════════════════════════
       THEME TABS
       ═══════════════════════════════════════════ */
    .themes-section { margin-bottom:40px; }
    .theme-tabs {
        display:flex; gap:8px; margin-bottom:20px;
        overflow-x:auto; padding-bottom:4px;
        scrollbar-width:none;
    }
    .theme-tabs::-webkit-scrollbar { display:none; }
    .theme-tab {
        flex-shrink:0; padding:9px 18px; border-radius:10px;
        font-size:13px; font-weight:500; cursor:pointer;
        border:1px solid var(--border-subtle);
        background:var(--bg-surface); color:var(--text-secondary);
        transition: all var(--transition-base);
        display:flex; align-items:center; gap:7px;
        user-select:none; white-space:nowrap;
    }
    .theme-tab:hover {
        border-color:var(--border-default);
        color:var(--text-primary);
        background:var(--bg-card);
    }
    .theme-tab.active {
        background: var(--accent-dim);
        border-color: var(--accent);
        color: var(--accent);
        font-weight:600;
    }
    .theme-tab .tab-icon { font-size:15px; }

    /* ═══════════════════════════════════════════
       PREDICTION MARKET CARDS
       ═══════════════════════════════════════════ */
    .predictions-grid {
        display:grid;
        grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
        gap:14px;
    }
    .pred-card {
        background: var(--bg-card);
        border:1px solid var(--border-subtle);
        border-radius:var(--radius-md);
        padding:18px 20px;
        transition: all var(--transition-base);
        display:flex; flex-direction:column; gap:14px;
        animation: fadeSlideIn 0.35s ease both;
    }
    .pred-card:hover {
        border-color:var(--border-default);
        box-shadow: var(--shadow-card);
        transform: translateY(-1px);
    }
    @keyframes fadeSlideIn {
        from { opacity:0; transform:translateY(10px); }
        to { opacity:1; transform:translateY(0); }
    }
    .pred-card:nth-child(1) { animation-delay: 0.00s; }
    .pred-card:nth-child(2) { animation-delay: 0.05s; }
    .pred-card:nth-child(3) { animation-delay: 0.10s; }
    .pred-card:nth-child(4) { animation-delay: 0.15s; }
    .pred-card:nth-child(5) { animation-delay: 0.20s; }
    .pred-card:nth-child(6) { animation-delay: 0.25s; }

    .pred-question {
        font-size:14px; font-weight:500; line-height:1.45;
        color:var(--text-primary);
        display:-webkit-box; -webkit-line-clamp:2;
        -webkit-box-orient:vertical; overflow:hidden;
    }
    .pred-bar-section { display:flex; flex-direction:column; gap:8px; }
    .pred-probabilities {
        display:flex; justify-content:space-between; align-items:center;
    }
    .pred-yes {
        font-size:24px; font-weight:700; letter-spacing:-0.5px;
    }
    .pred-no {
        font-size:13px; font-weight:500; color:var(--text-muted);
    }
    .pred-bar-track {
        width:100%; height:8px; background:var(--bg-elevated);
        border-radius:8px; overflow:hidden; position:relative;
    }
    .pred-bar-fill {
        height:100%; border-radius:8px;
        transition: width 0.8s cubic-bezier(.4,0,.2,1);
        position:relative;
    }
    .pred-bar-fill::after {
        content:''; position:absolute; inset:0;
        background: linear-gradient(90deg, transparent 60%, rgba(255,255,255,0.15));
        border-radius:inherit;
    }
    .pred-meta {
        display:flex; align-items:center; justify-content:space-between;
        font-size:11px; color:var(--text-muted);
    }
    .pred-volume {
        display:flex; align-items:center; gap:4px;
        font-weight:500;
    }
    .pred-volume svg { width:13px; height:13px; opacity:0.6; }
    .pred-end { font-weight:500; }
    .pred-source {
        font-size:10px; font-weight:600; text-transform:uppercase;
        letter-spacing:0.5px; padding:2px 7px; border-radius:4px;
        background:var(--bg-elevated); color:var(--text-muted);
    }

    /* 3d change badge (computed from CLOB price history) */
    .pred-delta {
        display:inline-flex; align-items:center; gap:2px;
        font-size:11px; font-weight:600; padding:2px 7px;
        border-radius:6px; margin-left:6px; vertical-align:middle;
        letter-spacing:-0.2px;
    }
    .pred-delta.up   { color:var(--green); background:var(--green-dim); }
    .pred-delta.down { color:var(--red);   background:var(--red-dim); }
    .pred-delta.flat { color:var(--text-muted); background:var(--bg-elevated); }
    .pred-delta svg  { width:11px; height:11px; }

    /* probability color helpers */
    .prob-high { color:#34D399; }
    .prob-mid  { color:#FBBF24; }
    .prob-low  { color:#F87171; }
    .bar-high  { background: linear-gradient(90deg, #059669, #34D399); }
    .bar-mid   { background: linear-gradient(90deg, #D97706, #FBBF24); }
    .bar-low   { background: linear-gradient(90deg, #DC2626, #F87171); }

    /* ═══════════════════════════════════════════
       FOOTER
       ═══════════════════════════════════════════ */
    .footer {
        margin-top:48px; padding-top:20px;
        border-top:1px solid var(--border-subtle);
        display:flex; justify-content:space-between; align-items:center;
        flex-wrap:wrap; gap:8px;
        font-size:11px; color:var(--text-muted);
    }
    .footer a {
        color:var(--accent); text-decoration:none; font-weight:500;
    }
    .footer a:hover { text-decoration:underline; }

    /* ═══════════════════════════════════════════
       LOADING SKELETON
       ═══════════════════════════════════════════ */
    .skeleton {
        background: linear-gradient(90deg,
            var(--bg-elevated) 25%, rgba(255,255,255,0.04) 50%, var(--bg-elevated) 75%);
        background-size:200% 100%;
        animation: shimmer 1.5s infinite;
        border-radius:6px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ═══════════════════════════════════════════
       RESPONSIVE
       ═══════════════════════════════════════════ */
    @media (max-width:640px) {
        .etf-grid { grid-template-columns:1fr 1fr; gap:10px; }
        .predictions-grid { grid-template-columns:1fr; }
        .etf-price { font-size:22px; }
        .etf-card { padding:14px 16px 10px; }
        body { padding:14px; }
        .header h1 { font-size:18px; }
    }
    @media (max-width:400px) {
        .etf-grid { grid-template-columns:1fr; }
    }
    </style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header class="header">
    <div class="header-left">
        <div class="logo">HQ</div>
        <h1>Dashboard</h1>
    </div>
    <div class="header-right">
        <span class="header-date" id="headerDate"></span>
        <div class="live-badge" id="marketBadge"><span class="live-dot"></span> Live</div>
    </div>
</header>

<!-- ═══ ETF SECTION ═══ -->
<div class="section-label">Market ETFs <span class="info-tip section-info" data-tip="EUR ETFs tracking major indices. Day % = change vs yesterday's close. 30D = change vs price ~30 days ago. L/H = today's low–high range with price position. Open/Prev = today's open & yesterday's close. YTD = since Jan 1. Chart = 1-month."><span class="info-dot">?</span></span></div>
<div class="etf-grid" id="etfGrid"></div>

<!-- ═══ PREDICTION MARKETS ═══ -->
<div class="themes-section">
    <div class="section-label">Prediction Markets <span class="info-tip section-info" data-tip="Real-money markets ranked by variation & activity. Yes % = probability. 3d = 3-day change in pts (from CLOB price history). Vol = total money wagered. Sorted by absolute 3d variation. Use ← → keys to switch themes."><span class="info-dot">?</span></span></div>
    <div class="theme-tabs" id="themeTabs"></div>
    <div class="predictions-grid" id="predictionsGrid"></div>
</div>

<!-- ═══ FOOTER ═══ -->
<footer class="footer">
    <span>Data sources: Yahoo Finance, <a href="https://polymarket.com" target="_blank">Polymarket</a></span>
    <span id="lastUpdated">Updating…</span>
</footer>

<script>
/* ═══════════════════════════════════════════════════════════
   CONFIGURATION
   ═══════════════════════════════════════════════════════════ */
const REFRESH_INTERVAL = 5 * 60 * 1000; // 5 min
const PRED_CACHE_TTL  = 2 * 60 * 1000;  // 2 min — show cache instantly, refresh in background if older
const _predCache = {};                   // { themeId: { items, ts } }
let _predAbort = null;                   // AbortController for current prediction load
let _lastETFData = null;                 // cached ETF data — avoids refetch on resize

/* ── CORS proxy — own Cloudflare Worker (fast) + free fallbacks ── */
const PROXY_URL = 'https://shy-block-4ddc.arthur-schonbach.workers.dev/?url=';

const FALLBACK_PROXIES = [
    'https://api.allorigins.win/raw?url=',
    'https://api.codetabs.com/v1/proxy/?quest=',
];

/** Return a Response wrapping valid JSON text, or null if body isn't JSON. */
function validateJsonResponse(text) {
    const t = text.trimStart();
    if (t.startsWith('[') || t.startsWith('{')) {
        return new Response(text, { status: 200, headers: { 'Content-Type': 'application/json' } });
    }
    return null;
}

/**
 * Fetch via our Cloudflare Worker proxy. Falls back to free proxies if the
 * Worker is down or upstream returns garbage (e.g. Yahoo "Too Many Requests").
 */
async function corsProxyFetch(rawUrl, timeout = 12000) {
    const sources = [PROXY_URL, ...FALLBACK_PROXIES];
    const errors = [];

    for (const prefix of sources) {
        try {
            const res = await fetch(prefix + encodeURIComponent(rawUrl), {
                signal: AbortSignal.timeout(timeout),
            });
            if (!res.ok) { errors.push(`${prefix}: HTTP ${res.status}`); continue; }
            const text = await res.text();
            const valid = validateJsonResponse(text);
            if (valid) return valid;
            errors.push(`${prefix}: non-JSON body`);
        } catch (e) {
            errors.push(`${prefix}: ${e.message}`);
        }
    }
    throw new Error('All proxies failed: ' + errors.join(' | '));
}

/* ═══════════════════════════════════════════════════════════
   ETF DATA
   ═══════════════════════════════════════════════════════════ */
const ETF_CONFIG = [
    { name:'MSCI World',        ticker:'IWDA.AS',  currency:'€', color:'#818CF8' },
    { name:'Nasdaq 100',        ticker:'CNDX.AS',  currency:'€', color:'#38BDF8' },
    { name:'Stoxx 600',         ticker:'EXSA.DE',  currency:'€', color:'#FB923C' },
    { name:'Emerging Markets',  ticker:'EMIM.AS',  currency:'€', color:'#C084FC' },
];

/* Generate realistic mock sparkline data */
function generateSparkline(basePrice, changePct, points = 30) {
    const data = [];
    const endPrice = basePrice;
    const startPrice = basePrice / (1 + changePct * 3 / 100);
    const drift = (endPrice - startPrice) / points;
    let price = startPrice;
    for (let i = 0; i < points; i++) {
        price += drift + (Math.random() - 0.48) * basePrice * 0.008;
        price = Math.max(price * 0.95, price);
        data.push(price);
    }
    data[data.length - 1] = endPrice;
    return data;
}

/* Fallback ETF data (realistic as of March 2026 estimates) */
function getMockETFData() {
    return [
        { price:89.54,  change:0.38,  changePct:0.43, open:89.16, prevClose:89.16, dayHigh:89.92, dayLow:88.80, ytdPct:5.8,  change30dPct:2.9 },
        { price:42.18,  change:0.34,  changePct:0.81, open:41.90, prevClose:41.84, dayHigh:42.30, dayLow:41.72, ytdPct:9.2,  change30dPct:4.6 },
        { price:27.14,  change:-0.05, changePct:-0.18, open:27.22, prevClose:27.19, dayHigh:27.35, dayLow:27.01, ytdPct:3.1,  change30dPct:-1.2 },
        { price:33.61,  change:0.11,  changePct:0.33, open:33.48, prevClose:33.50, dayHigh:33.78, dayLow:33.30, ytdPct:2.4,  change30dPct:1.7 },
    ];
}

function compute30dChangePct(timestamps, closes, currentPrice) {
    if (!Array.isArray(timestamps) || !Array.isArray(closes) || !timestamps.length || !closes.length) return null;

    const points = [];
    for (let i = 0; i < Math.min(timestamps.length, closes.length); i++) {
        const close = closes[i];
        if (close === null || Number.isNaN(close)) continue;
        points.push({ t: timestamps[i], c: close });
    }
    if (points.length < 2) return null;

    const latestTs = points[points.length - 1].t;
    const targetTs = latestTs - 30 * 86400;

    // Use the last available close at or before the 30-day target.
    let basePoint = points.find(p => p.t >= targetTs) || points[0];
    for (let i = points.length - 1; i >= 0; i--) {
        if (points[i].t <= targetTs) {
            basePoint = points[i];
            break;
        }
    }

    if (!basePoint?.c) return null;
    return ((currentPrice - basePoint.c) / basePoint.c) * 100;
}

/* Fetch real ETF data from Yahoo Finance — single YTD request per ETF,
   all 4 in parallel via our Cloudflare Worker. */
async function fetchETFData() {
    try {
        const promises = ETF_CONFIG.map(async (etf) => {
            const rawUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${etf.ticker}?range=ytd&interval=1d&includePrePost=false`;
            const res = await corsProxyFetch(rawUrl);
            if (!res) throw new Error('No response');
            const json = await res.json();
            const meta   = json.chart.result[0].meta;
            const timestamps = json.chart.result[0].timestamp || [];
            const quotes = json.chart.result[0].indicators.quote[0];
            const allCloses = (quotes.close || []).filter(c => c !== null);
            const price = meta.regularMarketPrice;

            const prevClose = allCloses.length >= 2
                ? allCloses[allCloses.length - 2]
                : meta.chartPreviousClose || price;

            const allOpens = (quotes.open || []).filter(o => o !== null);
            const open = allOpens.length ? allOpens[allOpens.length - 1] : price;

            const change = price - prevClose;
            const changePct = (change / prevClose) * 100;

            const ytdStart = meta.chartPreviousClose;
            const ytdPct = ytdStart ? ((price - ytdStart) / ytdStart) * 100 : null;
            const change30dPct = compute30dChangePct(timestamps, quotes.close || [], price);

            const sparkline = allCloses.slice(-22);

            return {
                price, change, changePct,
                prevClose, open,
                dayHigh: meta.regularMarketDayHigh || price,
                dayLow:  meta.regularMarketDayLow  || price,
                sparkline,
                ytdPct,
                change30dPct,
                live: true,
            };
        });
        return await Promise.all(promises);
    } catch (e) {
        console.warn('Yahoo Finance fetch failed, using mock data:', e.message);
        return null;
    }
}

]);

function isSportsEvent(event) {
    // Check tags
    const tags = (event.tags || []).map(t => (t.slug || '').toLowerCase());
    if (tags.some(t => SPORTS_TAG_SLUGS.has(t))) return true;
    // Check if any market has a sportsMarketType
    if ((event.markets || []).some(m => m.sportsMarketType)) return true;
    // Heuristic: title/description mentions common sports patterns
    const title = (event.title || '').toLowerCase();
    if (/\bvs\.?\b/.test(title) && /\b(fc|united|city|rovers|afc)\b/i.test(title)) return true;
    if (/\b(o\/u|over\/under|spread|moneyline|set \d|game \d)\b/i.test(title)) return true;
    return false;
}

    'economy':     ['economy','crypto','bitcoin','ethereum','fed-rates','inflation','tariffs'],

/* Try fetching real prediction market data from Polymarket */
async function fetchPolymarketData(tag) {
    try {
        const tagSlugs = THEME_TAG_MAP[tag] || [tag];
        let allEvents = [];

        /* Fetch all tag slugs in parallel via our proxy */
        const fetches = tagSlugs.map(async (slug) => {
            try {
                const rawUrl = `https://gamma-api.polymarket.com/events?closed=false&limit=10&order=volume&ascending=false&tag_slug=${slug}`;
                const res = await corsProxyFetch(rawUrl);
                return await res.json();
            } catch { return []; }
        });
        (await Promise.all(fetches)).forEach(arr => allEvents.push(...arr));

        /* De-duplicate by event id */
        const seen = new Set();
        allEvents = allEvents.filter(e => {
            if (seen.has(e.id)) return false;
            seen.add(e.id);
            return true;
        });

        /* Filter out sports events */
        allEvents = allEvents.filter(e => !isSportsEvent(e));

        /* Must have at least one active market with meaningful volume */
        allEvents = allEvents.filter(e => {
            const vol = e.volume || 0;
            if (vol < 5000) return false;
            const activeMarkets = (e.markets || []).filter(m => m.active && !m.closed);
            return activeMarkets.length > 0;
        });

        /* ── Initial ranking by volume to select candidates ── */
        allEvents.forEach(e => {
            const vol24 = e.volume24hr || 0;
            const volTotal = e.volume || 0;
            e._volScore = (Math.log10(vol24 + 1) * 70) + (Math.log10(volTotal + 1) * 30);
        });
        allEvents.sort((a, b) => (b._volScore || 0) - (a._volScore || 0));

        /* Take top 15 candidates (we'll narrow to 6 after fetching 3d variation) */
        allEvents = allEvents.slice(0, 15);

        if (allEvents.length === 0) return null;

        /* Transform events into card data */
        const items = allEvents.map(event => {
            const activeMarkets = (event.markets || [])
                .filter(m => m.active && !m.closed && m.outcomePrices);

            if (activeMarkets.length === 0) return null;

            const isMultiOutcome = event.negRisk || activeMarkets.length > 3;

            /* For multi-outcome events: pick the leader (highest-priced outcome).
               For binary events: use the highest-volume market. */
            let topMarket;
            if (isMultiOutcome) {
                topMarket = activeMarkets.reduce((best, m) => {
                    try {
                        const p = parseFloat(JSON.parse(m.outcomePrices)[0]);
                        const bp = parseFloat(JSON.parse(best.outcomePrices)[0]);
                        return p > bp ? m : best;
                    } catch { return best; }
                }, activeMarkets[0]);
            } else {
                activeMarkets.sort((a, b) =>
                    (parseFloat(b.volume) || 0) - (parseFloat(a.volume) || 0)
                );
                topMarket = activeMarkets[0];
            }

            /* Build the question text */
            let q;
            if (isMultiOutcome) {
                /* Show "Event Title: Top Mover" for multi-outcome */
                const outcome = topMarket.groupItemTitle || topMarket.question || '';
                const eventTitle = event.title || '';
                q = outcome && outcome !== eventTitle
                    ? `${eventTitle}: ${outcome}`
                    : eventTitle;
            } else {
                q = topMarket.question || event.title;
            }

            /* Parse yes probability */
            let yes;
            try {
                const prices = JSON.parse(topMarket.outcomePrices);
                yes = Math.round(parseFloat(prices[0]) * 100);
            } catch { yes = 50; }

            const volRaw = event.volume || parseFloat(topMarket.volume) || 0;
            const vol = formatVolume(volRaw);
            const endDate = event.endDate || topMarket.endDate;
            const end = endDate
                ? new Date(endDate).toLocaleDateString('en', { month:'short', year:'numeric' })
                : '—';

            /* Extract CLOB token ID for accurate price history lookup */
            let _tokenId = null;
            try {
                const ids = JSON.parse(topMarket.clobTokenIds);
                _tokenId = ids[0]; // "Yes" outcome token
            } catch {}

            return {
                q, yes, d3: null, vol, end, _tokenId, _volRaw: volRaw,
                src: 'Polymarket',
                live: true,
                url: `https://polymarket.com/event/${event.slug}`,
            };
        }).filter(Boolean);

        /* ── Fetch 3d CLOB deltas for all candidates in parallel ── */
        await Promise.all(items.map(async (item) => {
            if (!item._tokenId) return;
            item.d3 = await fetchClobPriceChange(item._tokenId);
        }));

        /* ── Score by variation (primary) + volume (secondary) ──
           Variation gets ~60% weight, volume ~40%. Items without
           delta data fall back to volume-only scoring. */
        items.forEach(item => {
            const absDelta = Math.abs(item.d3 || 0);
            const volLog = Math.log10((item._volRaw || 0) + 1);
            item._score = (absDelta * 5) + (volLog * 2);
        });
        items.sort((a, b) => (b._score || 0) - (a._score || 0));

        /* Take top 6 */
        const top = items.slice(0, 6);
        top.forEach(it => { delete it._volRaw; delete it._score; });

        return top.length >= 2 ? top : null;
    } catch (e) {
        console.warn(`Polymarket fetch failed for "${tag}":`, e.message);
        return null;
    }
}

function formatVolume(v) {
    if (v >= 1e6) return '$' + (v/1e6).toFixed(1) + 'M';
    if (v >= 1e3) return '$' + (v/1e3).toFixed(0) + 'K';
    return '$' + v;
}

/* Fetch ACTUAL 3d price change from CLOB price-history API.
   Returns integer percentage-point change (e.g. +3 means rose 3 pts), or null on failure.
   Fetches 1 week of daily data, then picks the point closest to 3 days ago. */
async function fetchClobPriceChange(tokenId) {
    try {
        const url = `https://clob.polymarket.com/prices-history?market=${tokenId}&interval=1w&fidelity=1440`;
        const res = await corsProxyFetch(url, 8000);
        const data = await res.json();
        const history = data?.history;
        if (!history || history.length < 2) return null;
        const last = parseFloat(history[history.length - 1].p);
        /* Find the data point closest to 3 days ago */
        const threeDaysAgo = Date.now() / 1000 - 3 * 86400;
        const ref = history.reduce((best, pt) =>
            Math.abs(pt.t - threeDaysAgo) < Math.abs(best.t - threeDaysAgo) ? pt : best
        );
        return Math.round((last - parseFloat(ref.p)) * 100);
    } catch { return null; }
}

/* ═══════════════════════════════════════════════════════════
   SPARKLINE DRAWING
   ═══════════════════════════════════════════════════════════ */
function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `${r},${g},${b}`;
}

function drawSparkline(canvasId, data, color, isUp) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    const w = rect.width, h = rect.height;
    const pad = 2;
    const min = Math.min(...data);
    const max = Math.max(...data);
    const range = max - min || 1;

    const points = data.map((v, i) => ({
        x: pad + (i / (data.length - 1)) * (w - pad * 2),
        y: pad + (1 - (v - min) / range) * (h - pad * 2),
    }));

    // Gradient fill
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    const c = hexToRgb(color);
    grad.addColorStop(0, `rgba(${c},0.18)`);
    grad.addColorStop(1, `rgba(${c},0.0)`);

    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) {
        const cpx = (points[i-1].x + points[i].x) / 2;
        ctx.quadraticCurveTo(points[i-1].x, points[i-1].y, cpx, (points[i-1].y + points[i].y) / 2);
    }
    ctx.quadraticCurveTo(
        points[points.length-2].x, points[points.length-2].y,
        points[points.length-1].x, points[points.length-1].y
    );

    // Fill
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // Stroke
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) {
        const cpx = (points[i-1].x + points[i].x) / 2;
        ctx.quadraticCurveTo(points[i-1].x, points[i-1].y, cpx, (points[i-1].y + points[i].y) / 2);
    }
    ctx.quadraticCurveTo(
        points[points.length-2].x, points[points.length-2].y,
        points[points.length-1].x, points[points.length-1].y
    );
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.stroke();

    // End dot
    const last = points[points.length - 1];
    ctx.beginPath();
    ctx.arc(last.x, last.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
}

                    <span class="pred-no">${100 - item.yes}% No</span>
                </div>
                <div class="pred-bar-track">
                    <div class="pred-bar-fill ${barClass}" style="width:0%"></div>
                </div>
            </div>
            <div class="pred-meta">
                <span class="pred-volume">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
                    ${item.vol}
                </span>
                <span class="pred-end">Ends ${item.end}</span>
                <span class="pred-source">${item.src}</span>
            </div>
        `;
        grid.appendChild(card);

        // Animate bar fill
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                card.querySelector('.pred-bar-fill').style.width = item.yes + '%';
            });
        });
    });
}

/* ═══════════════════════════════════════════════════════════
   DATA LOADING
   ═══════════════════════════════════════════════════════════ */
async function loadETFs() {
    const live = await fetchETFData();
    if (live) console.log('[HQ] ETF data: LIVE ✓');
    else console.warn('[HQ] ETF data: using mock fallback');
    const data = live || getMockETFData();
    _lastETFData = data;
    renderETFs(data);
}

async function loadPredictions(themeId, { force = false, silent = false } = {}) {
    /* Abort any in-flight prediction load (user switched themes fast) */
    if (_predAbort) { _predAbort.abort(); _predAbort = null; }
    const myAbort = new AbortController();
    _predAbort = myAbort;

    const cached = _predCache[themeId];
    const age = cached ? Date.now() - cached.ts : Infinity;

    /* ── Phase 0: Instant cache hit ── */
    if (cached && !force) {
        renderPredictions(cached.items);
        if (age < PRED_CACHE_TTL) {
            /* Fresh enough — but stream in missing CLOB deltas if needed */
            const needDeltas = cached.items.some(it => it._tokenId && it.d3 === null);
            if (needDeltas) {
                await Promise.all(cached.items.map(async (item) => {
                    if (!item._tokenId || item.d3 !== null) return;
                    item.d3 = await fetchClobPriceChange(item._tokenId);
                }));
                if (!myAbort.signal.aborted && activeTheme === themeId) {
                    renderPredictions(cached.items);
                }
            }
            schedulePreload(themeId);
            return;
        }
        /* Stale — show cached, silently refresh below */
        silent = true;
    }

    /* ── Phase 1: Skeleton (only if no cache) ── */
    if (!cached && !silent) {
        const grid = document.getElementById('predictionsGrid');
        grid.innerHTML = Array(6).fill(0).map(() => `
            <div class="pred-card">
                <div class="skeleton" style="height:18px;width:85%;margin-bottom:8px"></div>
                <div class="skeleton" style="height:14px;width:60%;margin-bottom:14px"></div>
                <div class="skeleton" style="height:28px;width:40%;margin-bottom:8px"></div>
                <div class="skeleton" style="height:8px;width:100%;margin-bottom:14px"></div>
                <div class="skeleton" style="height:12px;width:50%"></div>
            </div>
        `).join('');
    }

    /* ── Phase 2: Fetch Gamma data ── */
    const live = await fetchPolymarketData(themeId);
    if (myAbort.signal.aborted) return; // user switched away

    const items = live || PREDICTIONS[themeId] || [];
    const isLive = !!live;
    if (isLive) console.log(`[HQ] Predictions "${themeId}": LIVE ✓ (${items.length} items)`);
    else console.warn(`[HQ] Predictions "${themeId}": using mock fallback`);

    /* Render immediately (d3 already populated for live data) */
    _predCache[themeId] = { items, ts: Date.now() };
    if (activeTheme === themeId) renderPredictions(items);

    /* ── Phase 3: For live data, d3 is already fetched in fetchPolymarketData.
       For mock fallback, d3 is inline. No streaming needed. ── */

    /* ── Phase 4: Preload adjacent themes ── */
    if (!myAbort.signal.aborted) schedulePreload(themeId);
}

/* Preload adjacent themes in background (idle priority) */
function schedulePreload(currentThemeId) {
    const idx = THEMES.findIndex(t => t.id === currentThemeId);
    const neighbors = [
        THEMES[(idx + 1) % THEMES.length].id,
        THEMES[(idx - 1 + THEMES.length) % THEMES.length].id,
    ];
    /* Use requestIdleCallback if available, else setTimeout */
    const schedule = window.requestIdleCallback || (fn => setTimeout(fn, 300));
    neighbors.forEach(id => {
        const c = _predCache[id];
        if (c && (Date.now() - c.ts) < PRED_CACHE_TTL) return; // already fresh
        schedule(() => {
            if (activeTheme !== currentThemeId) return; // user moved on
            /* Silently fetch without rendering — just populate cache */
            preloadTheme(id);
        });
    });
}

async function preloadTheme(themeId) {
    try {
        const items = await fetchPolymarketData(themeId);
        if (!items) return;
        _predCache[themeId] = { items, ts: Date.now() };
        /* CLOB deltas deferred to loadPredictions — saves ~6 requests per preloaded theme */
        console.log(`[HQ] Preloaded "${themeId}" ✓`);
    } catch { /* silent */ }
}

/* ═══════════════════════════════════════════════════════════
   INITIALIZATION
   ═══════════════════════════════════════════════════════════ */
function updateTime() {
    const now = new Date();
    document.getElementById('headerDate').textContent = now.toLocaleDateString('en-GB', {
        weekday:'long', day:'numeric', month:'long', year:'numeric'
    });
    document.getElementById('lastUpdated').textContent =
        'Last updated: ' + now.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}

async function init() {
    updateTime();
    renderThemeTabs();
    await Promise.all([
        loadETFs(),
        loadPredictions(activeTheme),
    ]);

    // Auto-refresh — force bypasses cache
    setInterval(() => {
        updateTime();
        loadETFs();
        loadPredictions(activeTheme, { force: true });
    }, REFRESH_INTERVAL);
}

// Handle sparkline resize
window.addEventListener('resize', () => {
    clearTimeout(window._resizeTimer);
    window._resizeTimer = setTimeout(() => {
        if (_lastETFData) renderETFs(_lastETFData);
    }, 200);
});

init();

/* ═══════════════════════════════════════════════════════════
   KEYBOARD NAVIGATION — ← → to switch themes
   ═══════════════════════════════════════════════════════════ */
document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
        const idx = THEMES.findIndex(t => t.id === activeTheme);
        const next = e.key === 'ArrowRight'
            ? (idx + 1) % THEMES.length
            : (idx - 1 + THEMES.length) % THEMES.length;
        activeTheme = THEMES[next].id;
        renderThemeTabs();
        loadPredictions(activeTheme);
    }
});

/* ═══════════════════════════════════════════════════════════
   MARKET STATUS — reflects actual EU market hours (CET)
   ═══════════════════════════════════════════════════════════ */
function updateMarketStatus() {
    const badge = document.getElementById('marketBadge');
    if (!badge) return;
    const now = new Date();
    const cet = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Paris' }));
    const day = cet.getDay();
    const mins = cet.getHours() * 60 + cet.getMinutes();
    let open = false, label = 'Closed';
    if (day >= 1 && day <= 5) {
        if (mins >= 540 && mins < 1050) { open = true; label = 'Market Open'; }
        else if (mins >= 480 && mins < 540) { label = 'Pre-market'; }
    }
    badge.className = 'live-badge' + (open ? '' : ' closed');
    badge.innerHTML = open
        ? '<span class="live-dot"></span> ' + label
        : '<span class="closed-icon">◦</span> ' + label;
}
updateMarketStatus();
setInterval(updateMarketStatus, 60000);

/* ═══════════════════════════════════════════════════════════
   GLOBAL TOOLTIP — smart viewport-aware positioning
   ═══════════════════════════════════════════════════════════ */
(function() {
    const tip = document.createElement('div');
    tip.id = 'globalTooltip';
    document.body.appendChild(tip);

    let hideTimer = null;

    function show(e) {
        const trigger = e.target.closest('.info-tip');
        if (!trigger) return;
        const text = trigger.getAttribute('data-tip');
        if (!text) return;

        clearTimeout(hideTimer);
        tip.textContent = text;
        tip.classList.add('visible');

        // Measure
        const rect = trigger.getBoundingClientRect();
        const tw = tip.offsetWidth;
        const th = tip.offsetHeight;
        const gap = 8;
        const pad = 12; // min distance from viewport edge

        // Prefer above; fall back to below
        let top, left;
        if (rect.top - th - gap >= pad) {
            top = rect.top - th - gap;
        } else {
            top = rect.bottom + gap;
        }

        // Center horizontally on trigger, clamp to viewport
        left = rect.left + rect.width / 2 - tw / 2;
        left = Math.max(pad, Math.min(left, window.innerWidth - tw - pad));

        tip.style.top = top + 'px';
        tip.style.left = left + 'px';
    }

    function hide() {
        hideTimer = setTimeout(() => tip.classList.remove('visible'), 80);
    }

    document.addEventListener('pointerenter', show, true);
    document.addEventListener('pointerleave', function(e) {
        if (e.target.closest('.info-tip')) hide();
    }, true);

    // Also hide on scroll/resize to avoid stale position
    window.addEventListener('scroll', () => tip.classList.remove('visible'), true);
    window.addEventListener('resize', () => tip.classList.remove('visible'));
})();
</script>
